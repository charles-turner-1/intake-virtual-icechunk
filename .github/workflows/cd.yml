name: CD

on: [push, pull_request]

jobs:
  pypi:
    name: build and deploy to PyPI
    if: github.repository == 'ACCESS-NRI/intake-virtual-icechunk' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: "ubuntu-latest"
    permissions:
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install build dependencies
        run: python -m pip install build twine

      - name: Build distributions
        shell: bash -l {0}
        run: |
          git clean -xdf
          pyproject-build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  conda:
    name: build and deploy to conda
    needs: pypi
    if: always() && needs.pypi.result == 'success'
    runs-on: "ubuntu-latest"

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5

      - name: Build and upload the conda package
        run: pixi publish --clean --target-channel https://anaconda.org/accessnri/main
        env:
          ANACONDA_API_KEY: ${{ secrets.anaconda_token }}
          PIXI_NO_PROGRESS: true
