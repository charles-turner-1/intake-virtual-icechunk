name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - uses: pre-commit/action@v3.0.1

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      max-parallel: 8 # ACCESS-NRI has a limit of 20. This leaves room for other jobs.
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        pixi-env: ["test-py311", "test-py312", "test-py313", "test-py314"]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for setuptools_scm to determine version from git tags

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: ${{ matrix.pixi-env }}

      - name: Run tests
        run: pixi run -e ${{ matrix.pixi-env }} test

      - name: Upload code coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
