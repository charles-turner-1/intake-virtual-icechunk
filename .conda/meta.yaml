{% set version = environ.get('version', 'v0.0.0').lstrip('v') %}
{% set pyproj = load_file_data('../pyproject.toml', from_recipe_dir=True) %}
{% set deps = pyproj.get('project', {}).get('dependencies',[]) %}

package:
  name: intake-virtual-icechunk
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/i/intake-virtual-icechunk/intake_virtual_icechunk-{{ version }}.tar.gz"

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python
    - pip
    - setuptools_scm
  run:
    - python >=3.12
    {% for dep in deps %}
    - {{ dep }}
    {% endfor %}

test:
  imports:
    - intake_virtual_icechunk

about:
  home: https://github.com/ACCESS-NRI/intake-virtual-icechunk
  license: Apache Software
  license_family: APACHE
  summary: "An intake plugin for building and reading Icechunk stores from existing esm-datastores via VirtualiZarr and intake-esm"
  doc_url: https://intake-virtual-icechunk.readthedocs.io/en/latest/?badge=latest

extra:
  recipe-maintainers:
    - charles-turner-1
